# fly.toml app configuration file
# Generated for Heskala Ghost custom theme deployment

app = 'heskala-ghost'
primary_region = 'dfw'

[build]
  builder = "docker"
  dockerfile = "./Dockerfile"

[env]
  NODE_ENV = "production"
  url = "https://blog.heskala.com"
  database__client = "sqlite3"
  database__connection__filename = "/var/lib/ghost/content/data/ghost.db"
  database__useNullAsDefault = "true"
  server__host = "0.0.0.0"
  server__port = "2368"

[[mounts]]
  source = 'heskala_ghost_data'
  destination = '/var/lib/ghost/content'

[[services]]
  protocol = 'tcp'
  internal_port = 2368

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.ports]]
    port = 80
    handlers = ['http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
